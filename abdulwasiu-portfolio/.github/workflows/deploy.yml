name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    name: Deploy Frontend (Vercel/Netlify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm --filter frontend build
      # TODO: Add Vercel / Netlify deploy action here

  deploy-backend:
    name: Deploy Backend (Railway/Render)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
