name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [frontend, backend]

    defaults:
      run:
        working-directory: abdulwasiu-portfolio

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: abdulwasiu-portfolio/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Lint ${{ matrix.workspace }}
        run: pnpm --filter ${{ matrix.workspace }} lint

      - name: Type-check ${{ matrix.workspace }}
        run: pnpm --filter ${{ matrix.workspace }} type-check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    defaults:
      run:
        working-directory: abdulwasiu-portfolio

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: abdulwasiu-portfolio/pnpm-lock.yaml
      - run: pnpm install
      - run: pnpm build
